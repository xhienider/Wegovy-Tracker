<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#0d1117"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Wegovy Tracker"/>
<title>Wegovy Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:'Syne',sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent}
.app{max-width:860px;margin:0 auto;padding:32px 16px 80px}
.header{margin-bottom:32px}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}
.header-pill{display:inline-flex;align-items:center;gap:8px;background:#1a3a22;border:1px solid rgba(63,185,80,.27);border-radius:100px;padding:4px 14px;font-family:'DM Mono',monospace;font-size:11px;color:#3fb950;letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px}
.dot{width:6px;height:6px;border-radius:50%;background:#3fb950;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
h1{font-size:clamp(28px,5vw,44px);font-weight:800;letter-spacing:-.02em;color:#e6edf3;line-height:1.1}
h1 span{color:#3fb950}
.subtitle{color:#8b949e;font-size:15px;margin-top:8px;font-weight:400}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0}
.unit-toggle{display:flex;background:#161b22;border:1px solid #30363d;border-radius:8px;overflow:hidden}
.unit-btn{background:none;border:none;color:#8b949e;font-family:'DM Mono',monospace;font-size:12px;font-weight:500;padding:7px 16px;cursor:pointer;transition:all .15s;letter-spacing:.05em}
.unit-btn.active{background:#3fb950;color:#0d1117;font-weight:700}
.unit-btn:first-child{border-right:1px solid #30363d}
.sync-bar{display:flex;align-items:center;gap:10px;background:#1c2330;border:1px solid #30363d;border-radius:10px;padding:10px 16px;margin-bottom:20px;flex-wrap:wrap}
.sync-status{display:flex;align-items:center;gap:7px;font-family:'DM Mono',monospace;font-size:11px;color:#8b949e;flex:1;min-width:0}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#30363d;flex-shrink:0;transition:background .3s}
.sync-dot.connected{background:#3fb950}
.sync-dot.syncing{background:#e3b341;animation:pulse 1s infinite}
.sync-dot.error{background:#f85149}
.btn-gdrive{display:inline-flex;align-items:center;gap:7px;background:#161b22;border:1px solid #30363d;color:#c9d1d9;border-radius:7px;padding:7px 14px;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.btn-gdrive:hover{border-color:#8b949e;color:#e6edf3}
.btn-gdrive.connected{border-color:rgba(63,185,80,.4);color:#3fb950;background:#1a3a22}
.btn-fitbit{display:inline-flex;align-items:center;gap:7px;background:#161b22;border:1px solid #30363d;color:#c9d1d9;border-radius:7px;padding:7px 14px;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.btn-fitbit:hover{border-color:#00b0b9;color:#00b0b9}
.btn-fitbit.connected{border-color:rgba(0,176,185,.4);color:#00b0b9;background:#001f21}
.fitbit-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:24px}
.fitbit-stat{background:#1c2330;border:1px solid #30363d;border-radius:12px;padding:16px;display:flex;align-items:center;gap:12px}
.fitbit-stat-icon{font-size:22px;flex-shrink:0}
.fitbit-stat-label{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#8b949e;margin-bottom:3px}
.fitbit-stat-value{font-size:18px;font-weight:800;color:#00b0b9;letter-spacing:-.02em}
.fitbit-stat-sub{font-size:11px;color:#8b949e}
.activity-summary{background:#161b22;border:1px solid #30363d;border-left:3px solid #00b0b9;border-radius:10px;padding:12px 16px;margin:6px 0 10px 0;display:flex;flex-wrap:wrap;gap:12px;align-items:center}
.activity-summary-label{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#8b949e;width:100%;margin-bottom:2px}
.activity-summary-stat{display:flex;align-items:center;gap:6px;font-size:13px;color:#c9d1d9}
.activity-summary-val{font-weight:700;color:#00b0b9}
.btn-sync-history{display:inline-flex;align-items:center;gap:7px;background:#001f21;border:1px solid rgba(0,176,185,.4);color:#00b0b9;border-radius:8px;padding:9px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn-sync-history:hover{opacity:.8}
.btn-sync-history:disabled{opacity:.4;cursor:not-allowed}
.start-date-row{display:flex;align-items:center;gap:10px;margin-top:12px;flex-wrap:wrap}
.start-date-label{font-family:'DM Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#8b949e}
.start-date-input{background:#161b22;border:1px solid #30363d;border-radius:7px;color:#e6edf3;font-family:'Syne',sans-serif;font-size:13px;padding:6px 10px;outline:none;transition:border-color .2s}
.start-date-input:focus{border-color:rgba(63,185,80,.53)}
.btn-small{background:#1a3a22;border:1px solid rgba(63,185,80,.4);color:#3fb950;border-radius:7px;padding:6px 14px;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn-small:hover{opacity:.8}
.btn-link{background:none;border:none;color:#8b949e;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;text-decoration:underline;padding:0}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:32px}
.stat-card{background:#1c2330;border:1px solid #30363d;border-radius:14px;padding:20px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat-card.green::before{background:#3fb950}
.stat-card.teal::before{background:#39d0d8}
.stat-card.gold::before{background:#e3b341}
.stat-label{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:#8b949e;margin-bottom:8px}
.stat-value{font-size:28px;font-weight:800;letter-spacing:-.02em}
.stat-card.green .stat-value{color:#3fb950}
.stat-card.teal .stat-value{color:#39d0d8}
.stat-card.gold .stat-value{color:#e3b341}
.stat-sub{font-size:12px;color:#8b949e;margin-top:4px}
.chart-wrap{background:#1c2330;border:1px solid #30363d;border-radius:14px;padding:24px;margin-bottom:24px}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.chart-title{font-size:13px;font-weight:600;color:#8b949e;text-transform:uppercase;letter-spacing:.08em;font-family:'DM Mono',monospace}
.chart-empty{color:#8b949e;font-size:13px;text-align:center;padding:32px 0}
.btn-share{display:inline-flex;align-items:center;gap:7px;background:#075e54;color:#fff;border:none;border-radius:8px;padding:7px 14px;font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s}
.btn-share:hover{opacity:.88;transform:translateY(-1px)}
svg.chart{width:100%;overflow:visible}
.section-title{font-size:18px;font-weight:700;color:#c9d1d9;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.section-title::after{content:'';flex:1;height:1px;background:#30363d}
.form-card{background:#1c2330;border:1px solid #30363d;border-radius:14px;padding:24px;margin-bottom:24px;transition:border-color .3s,box-shadow .3s}
.form-card.flash{border-color:#3fb950;box-shadow:0 0 0 3px rgba(63,185,80,.2)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:540px){.form-grid{grid-template-columns:1fr}}
.field label{display:block;font-family:'DM Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#8b949e;margin-bottom:8px}
.field input,.field textarea{width:100%;background:#161b22;border:1px solid #30363d;border-radius:8px;color:#e6edf3;font-family:'Syne',sans-serif;font-size:14px;padding:10px 12px;outline:none;transition:border-color .2s}
.field input:focus,.field textarea:focus{border-color:rgba(63,185,80,.53)}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{background:#161b22;border:1px solid #30363d;border-radius:100px;padding:6px 14px;font-size:13px;cursor:pointer;transition:all .15s;color:#c9d1d9;user-select:none}
.chip.active{background:#1a3a22;border-color:#3fb950;color:#3fb950}
.chip.teal-active{background:#0d2f33;border-color:#39d0d8;color:#39d0d8}
.btn-primary{background:#3fb950;color:#0d1117;border:none;border-radius:8px;padding:12px 28px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s,transform .1s;width:100%;margin-top:4px}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
.log-entry{background:#1c2330;border:1px solid #30363d;border-radius:12px;padding:18px 20px;margin-bottom:10px;display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:start;transition:border-color .15s}
.log-entry:hover{border-color:rgba(63,185,80,.27)}
.log-date{font-family:'DM Mono',monospace;font-size:11px;color:#8b949e;white-space:nowrap;padding-top:2px}
.log-weight{font-size:22px;font-weight:800;color:#3fb950;letter-spacing:-.02em;line-height:1}
.log-unit{font-size:13px;font-weight:400;color:#8b949e}
.log-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.badge{font-size:11px;padding:3px 10px;border-radius:100px;font-family:'DM Mono',monospace}
.badge-dose{background:#0d2f33;color:#39d0d8;border:1px solid rgba(57,208,216,.2)}
.badge-activity{background:#2a1f3d;color:#b794f4;border:1px solid rgba(183,148,244,.2)}
.badge-feel{background:#1a2433;color:#c9d1d9;border:1px solid #30363d}
.log-notes{font-size:13px;color:#8b949e;margin-top:6px;font-style:italic}
.delete-btn{background:none;border:none;color:#30363d;cursor:pointer;font-size:16px;padding:2px 6px;border-radius:6px;transition:color .15s,background .15s;line-height:1}
.delete-btn:hover{color:#f85149;background:rgba(248,81,73,.094)}
.empty-state{text-align:center;padding:48px 24px;color:#8b949e;font-size:15px}
.empty-icon{font-size:40px;margin-bottom:12px}
.trend-up{color:#f85149}.trend-down{color:#3fb950}
.tabs{display:flex;gap:4px;background:#161b22;border:1px solid #30363d;border-radius:10px;padding:4px;margin-bottom:24px;width:fit-content}
.tab{background:none;border:1px solid transparent;color:#8b949e;font-family:'Syne',sans-serif;font-size:13px;font-weight:600;padding:8px 18px;border-radius:7px;cursor:pointer;transition:all .15s}
.tab.active{background:#1c2330;color:#e6edf3;border-color:#30363d}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#3fb950;color:#0d1117;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;padding:12px 24px;border-radius:100px;box-shadow:0 4px 24px rgba(0,0,0,.44);z-index:999;white-space:nowrap;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
.toast.error{background:#f85149;color:#fff}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{background:#1c2330;border:1px solid #30363d;border-radius:16px;padding:28px;width:100%;max-width:480px;transform:translateY(16px);transition:transform .2s}
.modal-overlay.show .modal{transform:translateY(0)}
.modal-title{font-size:17px;font-weight:700;color:#e6edf3;margin-bottom:6px}
.modal-sub{font-size:13px;color:#8b949e;margin-bottom:16px;line-height:1.6}
.modal-sub strong{color:#e6edf3}
.modal-textarea{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:8px;color:#e6edf3;font-family:'DM Mono',monospace;font-size:12px;padding:12px;outline:none;resize:vertical;min-height:120px;transition:border-color .2s}
.modal-textarea:focus{border-color:rgba(63,185,80,.53)}
.modal-btns{display:flex;gap:10px;margin-top:16px}
.modal-confirm{flex:1;background:#3fb950;color:#0d1117;border:none;border-radius:8px;padding:11px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.modal-confirm:disabled{opacity:.4;cursor:not-allowed}
.modal-cancel{background:#161b22;color:#8b949e;border:1px solid #30363d;border-radius:8px;padding:11px 18px;font-family:'Syne',sans-serif;font-size:14px;font-weight:600;cursor:pointer}
.transfer-bar{background:#1c2330;border:1px solid #30363d;border-radius:14px;padding:20px 24px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.transfer-label{font-family:'DM Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#8b949e;margin-bottom:4px}
.transfer-desc{font-size:13px;color:#c9d1d9}
.transfer-btns{display:flex;gap:10px;flex-wrap:wrap}
.btn-export{display:inline-flex;align-items:center;gap:7px;background:#1a3a22;border:1px solid rgba(63,185,80,.4);color:#3fb950;border-radius:8px;padding:9px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn-export:hover{opacity:.8}
.btn-import{display:inline-flex;align-items:center;gap:7px;background:#161b22;border:1px solid #30363d;color:#c9d1d9;border-radius:8px;padding:9px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-import:hover{border-color:#8b949e;color:#e6edf3}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="toast" id="toast"></div>
<div class="modal-overlay" id="importModal">
  <div class="modal">
    <div class="modal-title">Import backup</div>
    <div class="modal-sub">On another device tap <strong>Export backup</strong> to copy a code, then paste it below.</div>
    <textarea class="modal-textarea" id="importText" placeholder="Paste your backup code here…"></textarea>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeImport()">Cancel</button>
      <button class="modal-confirm" id="importConfirmBtn" onclick="doImport()" disabled>Import</button>
    </div>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
// ── Config ────────────────────────────────────────────────────────────────────
const CLIENT_ID = '917861287305-7r0fgoackpbgh3c8r8vm14ki2pt4bvr1.apps.googleusercontent.com';
const SCOPES    = 'https://www.googleapis.com/auth/drive.appdata';
const FILE_NAME = 'wegovy-tracker-data.json';

// ── Local storage ─────────────────────────────────────────────────────────────
const LS = { ENTRIES:'wg-entries', START:'wg-start', UNIT:'wg-unit', TOKEN:'wg-token', FILE:'wg-fileid' };
function lsGet(k)    { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } }
function lsSet(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
function lsDel(k)    { localStorage.removeItem(k); }

// ── App state ─────────────────────────────────────────────────────────────────
let entries     = lsGet(LS.ENTRIES) || [];
let startDate   = localStorage.getItem(LS.START) || '';
let unit        = localStorage.getItem(LS.UNIT)  || 'kg';
let activeTab   = 'log';
let form        = { date:today(), weight:'', dose:'', feeling:'', activities:[], notes:'' };
let editingStart = !startDate;
let tempStart    = startDate;

// Drive state
let accessToken = null;
let driveFileId = localStorage.getItem(LS.FILE) || null;
let syncStatus  = 'disconnected';
let tokenClient = null;
let saveTimer   = null;

// Fitbit state
const FB_CLIENT_ID  = '23V9VS';
const FB_REDIRECT   = 'https://xhienider.github.io/Wegovy-Tracker/';
const FB_SCOPES     = 'activity heartrate settings profile';
const FB_LS         = { TOKEN:'wg-fb-token', VERIFIER:'wg-fb-verifier', STATS:'wg-fb-stats', HISTORY:'wg-fb-history' };
let fbToken         = null;
let fbStats         = lsGet(FB_LS.STATS) || null; // { steps, calories, activeMinutes, heartRate, date }
let fbHistory       = lsGet(FB_LS.HISTORY) || {}; // { 'YYYY-MM-DD': { steps, calories, activeMinutes } }
let fbHistorySyncing = false;

// Restore Fitbit token if still valid
(function(){
  const t = lsGet(FB_LS.TOKEN);
  if (t?.access_token && t.exp > Date.now()+60000) fbToken = t.access_token;
})();

const DOSES      = ['0.25mg','0.5mg','1mg','1.7mg','2.4mg'];
const FEELINGS   = ['😊 Great','🙂 Good','😐 Okay','😴 Tired','🤢 Nauseous','💪 Strong'];
const ACTIVITIES = ['🚶 Walking','🏃 Running','🚴 Cycling','🏊 Swimming','🧘 Yoga','🏋️ Weights','💃 Dance','🤸 Other'];

function today()         { return new Date().toISOString().slice(0,10); }
function toDisplay(kg,u) { return u==='lbs' ? +(kg*2.20462).toFixed(1) : +kg.toFixed(1); }
function toKg(v,u)       { return u==='lbs' ? +(v/2.20462).toFixed(2)  : +parseFloat(v).toFixed(2); }
function fmtDate(d)      { return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}); }
function fmtShort(d)     { return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'}); }
function weekNum() {
  if (!startDate) return null;
  return Math.max(1, Math.ceil((Date.now()-new Date(startDate+'T00:00:00'))/(7*864e5)));
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type='success') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast'+(type==='error'?' error':'');
  requestAnimationFrame(()=>t.classList.add('show'));
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),4200);
}

// ── Google Drive ──────────────────────────────────────────────────────────────
function initGoogleAuth() {
  const check = setInterval(()=>{
    if (!window.google?.accounts?.oauth2) return;
    clearInterval(check);
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: async (resp) => {
        if (resp.error) {
          setSyncStatus('error');
          showToast('Sign-in failed: '+resp.error, 'error');
          return;
        }
        accessToken = resp.access_token;
        // Cache token with expiry
        lsSet(LS.TOKEN, { token:accessToken, exp: Date.now()+(resp.expires_in||3500)*1000 });
        setSyncStatus('syncing');
        updateSyncBar();
        await loadFromDrive();
      }
    });
    // Restore cached token if still valid
    const cached = lsGet(LS.TOKEN);
    if (cached?.token && cached.exp > Date.now()+60000) {
      accessToken = cached.token;
      setSyncStatus('syncing');
      updateSyncBar();
      loadFromDrive();
    }
  }, 300);
}

function signIn()  {
  if (!tokenClient) { showToast('Auth not ready, please wait a moment…','error'); return; }
  tokenClient.requestAccessToken({ prompt: accessToken?'':'consent' });
}
function signOut() {
  if (accessToken) { try { google.accounts.oauth2.revoke(accessToken, ()=>{}); } catch {} }
  accessToken=null; driveFileId=null;
  lsDel(LS.TOKEN); lsDel(LS.FILE);
  setSyncStatus('disconnected');
  render();
  showToast('Signed out of Google Drive.');
}

function setSyncStatus(s) { syncStatus=s; updateSyncBar(); }
function updateSyncBar() {
  const dot=document.getElementById('syncDot');
  const txt=document.getElementById('syncText');
  const btn=document.getElementById('syncBtn');
  if (!dot||!txt||!btn) return;
  const labels={disconnected:'Not connected — tap to sync with Google Drive',syncing:'Syncing…',connected:'Synced to Google Drive ✓',error:'Sync error — tap to retry'};
  dot.className='sync-dot'+(syncStatus!=='disconnected'?' '+syncStatus:'');
  txt.textContent=labels[syncStatus]||syncStatus;
  if (accessToken) {
    btn.textContent='Sign out';
    btn.className='btn-gdrive connected';
    btn.onclick=signOut;
  } else {

    btn.className='btn-gdrive';

}

async function driveReq(method, url, body, ct) {
  const hdrs={'Authorization':'Bearer '+accessToken};
  if (ct) hdrs['Content-Type']=ct;
  const r=await fetch(url,{method,headers:hdrs,body});
  if (r.status===401) {
    accessToken=null; lsDel(LS.TOKEN);
    setSyncStatus('disconnected'); render();
    showToast('Google session expired. Please reconnect.','error');
    throw new Error('auth_expired');
  }
  return r;
}

async function findFile() {
  const r=await driveReq('GET',`https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='${FILE_NAME}'&fields=files(id)`);
  const d=await r.json();
  return d.files?.length ? d.files[0].id : null;
}

async function loadFromDrive() {
  try {
    if (!driveFileId) driveFileId = await findFile();
    if (!driveFileId) {
      // No file yet — save current local data up
      await writeToDrive();
      return;
    }
    const r=await driveReq('GET',`https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`);
    if (!r.ok) throw new Error('read_failed');
    const data=await r.json();
    if (data.entries?.length) {
      entries=data.entries; lsSet(LS.ENTRIES,entries);
    }
    if (data.startDate) { startDate=data.startDate; localStorage.setItem(LS.START,startDate); editingStart=false; tempStart=startDate; }
    if (data.unit)      { unit=data.unit; localStorage.setItem(LS.UNIT,unit); }
    setSyncStatus('connected');
    render();
    showToast('✅ Data loaded from Google Drive!');
  } catch(e) {
    if (e.message!=='auth_expired') { setSyncStatus('error'); updateSyncBar(); showToast('Drive load failed: '+e.message,'error'); }
  }
}

async function writeToDrive() {
  if (!accessToken) return;
  setSyncStatus('syncing'); updateSyncBar();
  try {
    const payload=JSON.stringify({version:1,savedAt:new Date().toISOString(),entries,startDate,unit});
    if (!driveFileId) driveFileId=await findFile();
    if (driveFileId) {
      await driveReq('PATCH',
        `https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`,
        payload,'application/json');
    } else {
      const boundary='wg_bnd_'+Date.now();
      const meta=JSON.stringify({name:FILE_NAME,parents:['appDataFolder']});
      const body=`--${boundary}\r\nContent-Type: application/json\r\n\r\n${meta}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${payload}\r\n--${boundary}--`;
      const r=await driveReq('POST',
        'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',
        body,`multipart/related; boundary=${boundary}`);
      const d=await r.json();
      driveFileId=d.id;
      localStorage.setItem(LS.FILE,driveFileId);
    }
    setSyncStatus('connected'); updateSyncBar();
  } catch(e) {
    if (e.message!=='auth_expired') { setSyncStatus('error'); updateSyncBar(); }
  }
}

function scheduleSave() {
  lsSet(LS.ENTRIES, entries); // always save locally immediately
  clearTimeout(saveTimer);
  saveTimer=setTimeout(writeToDrive, 1500); // debounce Drive writes
}

// ── Fitbit OAuth 2.0 PKCE ─────────────────────────────────────────────────────
async function sha256(plain) {
  const enc = new TextEncoder().encode(plain);
  const hash = await crypto.subtle.digest('SHA-256', enc);
  return btoa(String.fromCharCode(...new Uint8Array(hash)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
function randomStr(len=64) {
  const arr = new Uint8Array(len);
  crypto.getRandomValues(arr);
  return btoa(String.fromCharCode(...arr)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'').slice(0,len);
}

async function fitbitSignIn() {
  const verifier = randomStr(64);
  const challenge = await sha256(verifier);
  lsSet(FB_LS.VERIFIER, verifier);
  const params = new URLSearchParams({
    response_type:'code', client_id:FB_CLIENT_ID,
    redirect_uri:FB_REDIRECT, scope:FB_SCOPES,
    code_challenge:challenge, code_challenge_method:'S256',
    state:'fitbit_auth'
  });
  window.location.href = 'https://www.fitbit.com/oauth2/authorize?'+params;
}

async function fitbitHandleCallback() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('state') !== 'fitbit_auth' || !params.get('code')) return;
  // Clean URL
  window.history.replaceState({}, '', FB_REDIRECT);
  const code = params.get('code');
  const verifier = lsGet(FB_LS.VERIFIER);
  if (!verifier) { showToast('Fitbit auth error: missing verifier','error'); return; }
  try {
    showToast('Connecting to Fitbit…');
    const resp = await fetch('https://api.fitbit.com/oauth2/token', {
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body: new URLSearchParams({
        client_id:FB_CLIENT_ID, grant_type:'authorization_code',
        redirect_uri:FB_REDIRECT, code, code_verifier:verifier
      })
    });
    const data = await resp.json();
    if (data.errors || !data.access_token) throw new Error(data.errors?.[0]?.message||'Token exchange failed');
    fbToken = data.access_token;
    lsSet(FB_LS.TOKEN, { access_token:fbToken, exp: Date.now()+(data.expires_in||28800)*1000 });
    lsDel(FB_LS.VERIFIER);
    showToast('✅ Fitbit connected!');
    await fetchFitbitStats();
    render();
  } catch(e) {
    showToast('Fitbit connection failed: '+e.message,'error');
  }
}

function fitbitSignOut() {
  fbToken=null; fbStats=null;
  lsDel(FB_LS.TOKEN); lsDel(FB_LS.VERIFIER); lsDel(FB_LS.STATS);
  render();
  showToast('Signed out of Fitbit.');
}

async function fetchFitbitStats() {
  if (!fbToken) return;
  try {
    const d = today();
    const [actResp, hrResp] = await Promise.all([
      fetch(`https://api.fitbit.com/1/user/-/activities/date/${d}.json`,
        {headers:{Authorization:'Bearer '+fbToken}}),
      fetch(`https://api.fitbit.com/1/user/-/activities/heart/date/${d}/1d.json`,
        {headers:{Authorization:'Bearer '+fbToken}})
    ]);
    if (actResp.status===401) { fbToken=null; lsDel(FB_LS.TOKEN); render(); showToast('Fitbit session expired. Please reconnect.','error'); return; }
    const act = await actResp.json();
    const hr  = await hrResp.json();
    const sum = act.summary || {};
    const restHR = hr['activities-heart']?.[0]?.value?.restingHeartRate || null;
    fbStats = {
      date: d,
      steps:         sum.steps || 0,
      calories:      sum.caloriesOut || 0,
      activeMinutes: (sum.fairlyActiveMinutes||0)+(sum.veryActiveMinutes||0),
      distance:      sum.distances?.find(x=>x.activity==='total')?.distance?.toFixed(1) || '0',
      restingHR:     restHR
    };
    lsSet(FB_LS.STATS, fbStats);
    render();
  } catch(e) {
    console.warn('Fitbit fetch error', e);
  }
}

// ── Fitbit History Sync ───────────────────────────────────────────────────────
async function fetchFitbitHistory() {
  if (!fbToken || !startDate) {
    showToast('Connect Fitbit and set your Wegovy start date first.','error');
    return;
  }
  fbHistorySyncing = true;
  render();

  try {
    const start = startDate;
    const end   = today();

    // Fitbit allows fetching up to 1095 days of time-series data in one call
    const [stepsResp, calResp, activeResp] = await Promise.all([
      fetch(`https://api.fitbit.com/1/user/-/activities/steps/date/${start}/${end}.json`,
        {headers:{Authorization:'Bearer '+fbToken}}),
      fetch(`https://api.fitbit.com/1/user/-/activities/calories/date/${start}/${end}.json`,
        {headers:{Authorization:'Bearer '+fbToken}}),
      fetch(`https://api.fitbit.com/1/user/-/activities/minutesVeryActive/date/${start}/${end}.json`,
        {headers:{Authorization:'Bearer '+fbToken}})
    ]);

    if (stepsResp.status===401) {
      fbToken=null; lsDel(FB_LS.TOKEN); fbHistorySyncing=false;
      showToast('Fitbit session expired. Please reconnect.','error'); render(); return;
    }

    const stepsData  = await stepsResp.json();
    const calData    = await calResp.json();
    const activeData = await activeResp.json();

    // Build a map keyed by date
    const history = {};
    (stepsData['activities-steps']||[]).forEach(d=>{ history[d.dateTime]={ steps:parseInt(d.value)||0, calories:0, activeMinutes:0 }; });
    (calData['activities-calories']||[]).forEach(d=>{ if(history[d.dateTime]) history[d.dateTime].calories=parseInt(d.value)||0; });
    (activeData['activities-minutesVeryActive']||[]).forEach(d=>{ if(history[d.dateTime]) history[d.dateTime].activeMinutes=parseInt(d.value)||0; });

    fbHistory = history;
    lsSet(FB_LS.HISTORY, fbHistory);
    fbHistorySyncing = false;
    render();

    const days = Object.keys(history).length;
    showToast(`✅ Synced ${days} days of Fitbit history!`);
  } catch(e) {
    fbHistorySyncing = false;
    render();
    showToast('History sync failed: '+e.message,'error');
  }
}

// Returns array of calendar weeks between fromDate (inclusive) and toDate (exclusive)
// Each week: { label, days: [{date, steps, calories, activeMinutes}] }
function fitbitWeeklyBreakdown(fromDate, toDate) {
  const weeks = [];
  let cur = new Date(fromDate+'T00:00:00');
  const end = new Date(toDate+'T00:00:00');
  let week = null;

  while (cur < end) {
    const key  = cur.toISOString().slice(0,10);
    const dow  = cur.getDay(); // 0=Sun
    // Start a new week block on Monday (dow===1) or on the very first day
    if (!week || dow === 1) {
      if (week) weeks.push(week);
      // Week label: Mon dd MMM
      const label = cur.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
      week = { label, startDate: key, days: [] };
    }
    const data = fbHistory[key] || null;
    week.days.push({ date: key, ...(data || { steps:0, calories:0, activeMinutes:0 }), hasData: !!data });
    cur.setDate(cur.getDate()+1);
  }
  if (week && week.days.length) weeks.push(week);
  return weeks.filter(w => w.days.some(d=>d.hasData));
}

function closeImport() { document.getElementById('importModal').classList.remove('show'); }
document.getElementById('importText').addEventListener('input',function(){ document.getElementById('importConfirmBtn').disabled=!this.value.trim(); });

function doImport() {
  try {
    const data=JSON.parse(document.getElementById('importText').value.trim());
    if (!data.entries||!Array.isArray(data.entries)) throw new Error();
    entries=data.entries; scheduleSave();
    if (data.startDate){ startDate=data.startDate; localStorage.setItem(LS.START,startDate); editingStart=false; tempStart=startDate; }
    if (data.unit)     { unit=data.unit; localStorage.setItem(LS.UNIT,unit); }
    closeImport(); render();
    showToast('✅ Imported '+entries.length+' entries!');
  } catch { showToast('❌ Invalid backup code.','error'); }
}

async function doExport() {
  const payload=JSON.stringify({version:1,exportedAt:new Date().toISOString(),startDate,unit,entries});
  try { await navigator.clipboard.writeText(payload); showToast('✅ Backup code copied to clipboard!'); }

    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([payload],{type:'application/json'}));
    a.download='wegovy-backup-'+today()+'.json'; a.click();

}

// ── Chart ─────────────────────────────────────────────────────────────────────
function drawChart(el,ents,u){
  const s=[...ents].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const dw=s.map(e=>toDisplay(e.weight,u));
  const mn=Math.min(...dw)-(u==='lbs'?2:1), mx=Math.max(...dw)+(u==='lbs'?2:1);
  const W=700,H=180,pL=44,pR=20,pT=16,pB=24,iW=W-pL-pR,iH=H-pT-pB-20;
  const px=i=>pL+(i/(s.length-1))*iW, py=w=>pT+iH-((w-mn)/(mx-mn))*iH;
  const pts=s.map((e,i)=>`${px(i)},${py(dw[i])}`).join(' ');
  // Extract just the emoji from feeling string (first char which is the emoji)
  const emoji=e=>e.feeling?[...e.feeling][0]:'';
  el.setAttribute('viewBox',`0 0 ${W} ${H}`); el.setAttribute('height',H);
  el.innerHTML=`<defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#3fb950" stop-opacity=".25"/><stop offset="100%" stop-color="#3fb950" stop-opacity="0"/>
  </linearGradient></defs>
  ${[0,.25,.5,.75,1].map(t=>{const y=pT+t*iH,v=(mx-(mx-mn)*t).toFixed(1);
    return`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="#30363d" stroke-width="1"/>
    <text x="${pL-6}" y="${y+4}" text-anchor="end" fill="#8b949e" font-size="10" font-family="DM Mono,monospace">${v}</text>`;}).join('')}
  <polygon points="${pL},${pT+iH} ${pts} ${px(s.length-1)},${pT+iH}" fill="url(#wg)"/>
  <polyline points="${pts}" fill="none" stroke="#3fb950" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  ${s.map((e,i)=>{
    const em=emoji(e);
    const cx=px(i), cy=py(dw[i]);
    if(em){
      // Emoji label — no dot, just the emoji centered on the point
      return `<circle cx="${cx}" cy="${cy}" r="11" fill="#1c2330" stroke="#30363d" stroke-width="1.5"/>
              <text x="${cx}" y="${cy+5}" text-anchor="middle" font-size="13">${em}</text>`;
    } else {
      return `<circle cx="${cx}" cy="${cy}" r="5" fill="#1c2330" stroke="#3fb950" stroke-width="2.5"/>`;
    }
  }).join('')}
  ${s.map((e,i)=>(i===0||i===s.length-1||s.length<=6)?
    `<text x="${px(i)}" y="${H-4}" text-anchor="middle" fill="#8b949e" font-size="9" font-family="DM Mono,monospace">${fmtShort(e.date)}</text>`:''
  ).join('')}`;
}

function shareChart(){
  const s=[...entries].sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(s.length<2){showToast('Add at least 2 entries first.');return;}
  const u=unit,CW=800,CH=320,c=document.createElement('canvas');
  c.width=CW;c.height=CH;const ctx=c.getContext('2d');
  ctx.fillStyle='#1c2330';ctx.fillRect(0,0,CW,CH);
  ctx.fillStyle='#3fb950';ctx.fillRect(0,0,CW,3);
  ctx.fillStyle='#8b949e';ctx.font='600 12px monospace';ctx.fillText('WEGOVY WEIGHT TREND',28,30);
  const fE=s[0],lE=s[s.length-1],loss=toDisplay(Math.abs(fE.weight-lE.weight),u);
  ctx.fillStyle='#3fb950';ctx.font='bold 26px sans-serif';ctx.fillText(`\u2212${loss} ${u} lost`,28,62);
  ctx.fillStyle='#8b949e';ctx.font='13px sans-serif';
  const wn=weekNum();
  ctx.fillText(`${toDisplay(fE.weight,u)} ${u}  \u2192  ${toDisplay(lE.weight,u)} ${u}   |   ${s.length} entries${wn?'   |   Week '+wn:''}`,28,82);
  const dw=s.map(e=>toDisplay(e.weight,u));
  const pL=52,pR=28,pT=104,pB=44,iW=CW-pL-pR,iH=CH-pT-pB;
  const mn=Math.min(...dw)-(u==='lbs'?2:1),mx=Math.max(...dw)+(u==='lbs'?2:1);
  const px=i=>pL+(i/(s.length-1))*iW, py=w=>pT+iH-((w-mn)/(mx-mn))*iH;
  [0,.25,.5,.75,1].forEach(t=>{
    const y=pT+t*iH,v=(mx-(mx-mn)*t).toFixed(1);
    ctx.strokeStyle='#30363d';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(CW-pR,y);ctx.stroke();
    ctx.fillStyle='#8b949e';ctx.font='11px monospace';ctx.textAlign='right';ctx.fillText(v,pL-8,y+4);ctx.textAlign='left';
  });
  ctx.beginPath();ctx.moveTo(px(0),pT+iH);dw.forEach((w,i)=>ctx.lineTo(px(i),py(w)));
  ctx.lineTo(px(s.length-1),pT+iH);ctx.closePath();
  const g=ctx.createLinearGradient(0,pT,0,pT+iH);g.addColorStop(0,'rgba(63,185,80,.28)');g.addColorStop(1,'rgba(63,185,80,0)');
  ctx.fillStyle=g;ctx.fill();
  ctx.beginPath();dw.forEach((w,i)=>i===0?ctx.moveTo(px(i),py(w)):ctx.lineTo(px(i),py(w)));
  ctx.strokeStyle='#3fb950';ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.lineCap='round';ctx.stroke();
  dw.forEach((w,i)=>{
    const em=s[i].feeling?[...s[i].feeling][0]:'';
    const cx=px(i),cy=py(w);
    if(em){
      ctx.beginPath();ctx.arc(cx,cy,11,0,Math.PI*2);ctx.fillStyle='#1c2330';ctx.fill();
      ctx.strokeStyle='#30363d';ctx.lineWidth=1.5;ctx.stroke();
      ctx.font='13px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(em,cx,cy);ctx.textBaseline='alphabetic';
    } else {
      ctx.beginPath();ctx.arc(cx,cy,5,0,Math.PI*2);ctx.fillStyle='#1c2330';ctx.fill();
      ctx.strokeStyle='#3fb950';ctx.lineWidth=2.5;ctx.stroke();
    }
  });
  ctx.fillStyle='#8b949e';ctx.font='10px monospace';ctx.textAlign='center';
  s.forEach((e,i)=>{if(i===0||i===s.length-1||s.length<=6)ctx.fillText(fmtShort(e.date),px(i),CH-14);});
  ctx.textAlign='right';ctx.fillStyle='#30363d';ctx.font='11px monospace';ctx.fillText('Wegovy Tracker',CW-20,CH-14);
  c.toBlob(blob=>{
    if(!blob){showToast('Export failed.','error');return;}
    if(navigator.share&&navigator.canShare?.({files:[new File([blob],'w.png',{type:'image/png'})]})){
      navigator.share({files:[new File([blob],'wegovy-progress.png',{type:'image/png'})],title:'My Wegovy Progress'}).catch(()=>{});
    } else {
      const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='wegovy-progress.png';a.click();
      showToast('📥 Image downloaded!');
    }
  },'image/png');
}

        </div>
        <button class="btn-gdrive${accessToken?' connected':''}" id="syncBtn" onclick="${accessToken?'signOut()':'signIn()'}">
          ${accessToken?'Sign out':`<svg width="14" height="14" viewBox="0 0 24 24" style="flex-shrink:0"><path fill="#4285f4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34a853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#fbbc05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#ea4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>Connect Google Drive`}
        </button>
      </div>
      <div class="sync-bar" style="margin-top:-12px">
        <div class="sync-status">
          <span class="sync-dot${fbToken?' connected':''}" style="background:${fbToken?'#00b0b9':'#30363d'}"></span>
          <span style="font-family:'DM Mono',monospace;font-size:11px;color:#8b949e">${fbToken?'Fitbit connected ✓':'Fitbit not connected'}</span>
        </div>
        <button class="btn-fitbit${fbToken?' connected':''}" id="fitbitBtn" onclick="${fbToken?'fitbitSignOut()':'fitbitSignIn()'}">
          ${fbToken?'Sign out Fitbit':'<svg width="14" height="14" viewBox="0 0 30 30" fill="#00b0b9"><path d="M15 2a13 13 0 1 0 0 26A13 13 0 0 0 15 2zm0 5.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3zm-4 3a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5zm8 0a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5zm-10 4a1 1 0 1 1 0 2 1 1 0 0 1 0-2zm12 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2zm-6 1a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3zm-5 4a1 1 0 1 1 0 2 1 1 0 0 1 0-2zm10 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2zm-5 3a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5z"/></svg>Connect Fitbit'}
        </button>
      </div>
      ${fbToken && fbStats && fbStats.date===today() ? `
      <div class="fitbit-stats">
        <div class="fitbit-stat"><span class="fitbit-stat-icon">🚶</span><div><div class="fitbit-stat-label">Steps Today</div><div class="fitbit-stat-value">${fbStats.steps.toLocaleString()}</div></div></div>
        <div class="fitbit-stat"><span class="fitbit-stat-icon">🔥</span><div><div class="fitbit-stat-label">Calories</div><div class="fitbit-stat-value">${fbStats.calories.toLocaleString()}</div></div></div>
        <div class="fitbit-stat"><span class="fitbit-stat-icon">⚡</span><div><div class="fitbit-stat-label">Active Mins</div><div class="fitbit-stat-value">${fbStats.activeMinutes}</div></div></div>
        ${fbStats.restingHR?`<div class="fitbit-stat"><span class="fitbit-stat-icon">❤️</span><div><div class="fitbit-stat-label">Resting HR</div><div class="fitbit-stat-value">${fbStats.restingHR}</div><div class="fitbit-stat-sub">bpm</div></div></div>`:''}
      </div>` : fbToken ? `<div style="font-size:12px;color:#8b949e;font-family:'DM Mono',monospace;margin-bottom:12px">Loading today's Fitbit stats…</div>` : ''}

      <div class="start-date-row">
        <span class="start-date-label">Wegovy started:</span>
        ${editingStart?`<input type="date" class="start-date-input" id="startInput" value="${tempStart}"/><button class="btn-small" onclick="saveStartDate()">Save</button>`
        :`<span style="font-family:'DM Mono',monospace;font-size:13px;color:#c9d1d9">${startDate?new Date(startDate+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):'—'}</span>
          <button class="btn-link" onclick="editStart()">edit</button>`}
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card green"><div class="stat-label">Total Lost</div>
        <div class="stat-value">${lossDisp!==null?(lossKg>0?'−':'+')+lossDisp:'—'}</div><div class="stat-sub">${u} since start</div></div>
      <div class="stat-card teal"><div class="stat-label">Current Weight</div>
        <div class="stat-value">${cur?toDisplay(cur.weight,u):'—'}</div><div class="stat-sub">${u}</div></div>
      <div class="stat-card gold"><div class="stat-label">Week</div>
        <div class="stat-value">${wn??'—'}</div><div class="stat-sub">on Wegovy</div></div>
    </div>

    <div class="chart-wrap">
      <div class="chart-header">
        <div class="chart-title">Weight Trend (${u})</div>
        ${entries.length>=2?`<button class="btn-share" onclick="shareChart()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.118 1.528 5.852L0 24l6.305-1.654A11.954 11.954 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.007-1.373l-.36-.214-3.732.979.995-3.638-.235-.374A9.818 9.818 0 012.182 12C2.182 6.58 6.58 2.182 12 2.182c5.42 0 9.818 4.398 9.818 9.818 0 5.42-4.398 9.818-9.818 9.818z"/></svg>
          Share via WhatsApp</button>`:''}
      </div>
      ${entries.length>=2?`<svg class="chart" id="chartSvg"></svg>`:`<div class="chart-empty">Add at least 2 entries to see your chart</div>`}
    </div>

    <div class="tabs">
      <button class="tab${activeTab==='log'?' active':''}" onclick="setTab('log')">Log Entry</button>
      <button class="tab${activeTab==='history'?' active':''}" onclick="setTab('history')">History</button>
    </div>
    ${activeTab==='log'?renderLog():renderHistory()}
  `;
  if (entries.length>=2) drawChart(document.getElementById('chartSvg'),entries,u);
  // Sync save button state after render
  const saveBtn = document.getElementById('saveBtn');
  if (saveBtn) saveBtn.disabled = !form.weight || !form.date;
}

function renderLog(){
  return `<div class="form-card" id="formCard">
    <div class="section-title">New Check-in</div>
    <div class="form-grid">
      <div class="field"><label>Date</label><input type="date" value="${form.date}" onchange="form.date=this.value"/></div>
      <div class="field"><label>Weight (${unit})</label><input type="number" step="0.1" placeholder="${unit==='lbs'?'e.g. 203.5':'e.g. 92.4'}" value="${form.weight}" oninput="form.weight=this.value"/></div>
    </div>
    <div class="field" style="margin-bottom:16px"><label>Wegovy Dose</label>
      <div class="chips" id="chips-dose">${DOSES.map((d,i)=>`<span class="chip${form.dose===d?' teal-active':''}" data-type="dose" data-i="${i}">${d}</span>`).join('')}</div></div>
    <div class="field" style="margin-bottom:16px"><label>How are you feeling?</label>
      <div class="chips" id="chips-feeling">${FEELINGS.map((f,i)=>`<span class="chip${form.feeling===f?' active':''}" data-type="feeling" data-i="${i}">${f}</span>`).join('')}</div></div>
    <div class="field" style="margin-bottom:16px"><label>Activity today</label>
      <div class="chips" id="chips-activity">${ACTIVITIES.map((a,i)=>`<span class="chip${form.activities.includes(a)?' active':''}" data-type="activity" data-i="${i}">${a}</span>`).join('')}</div></div>
    <div class="field" style="margin-bottom:20px"><label>Notes</label>
      <textarea rows="2" placeholder="Side effects, appetite, energy, wins..." oninput="form.notes=this.value">${form.notes}</textarea></div>
    <button class="btn-primary" id="saveBtn" onclick="addEntry()">Save Entry</button>
  </div>`;
}

function renderHistory(){
  const u=unit,bd=[...entries].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const hasFbHistory = Object.keys(fbHistory).length > 0;

  // Render weekly activity blocks between two dates
  function weeklyBlocks(fromDate, toDate) {
    if (!hasFbHistory) return '';
    const weeks = fitbitWeeklyBreakdown(fromDate, toDate);
    if (!weeks.length) return '';
    return weeks.map(w => {
      const tot = d => w.days.reduce((s,x)=>s+(x[d]||0),0);
      const daysWithData = w.days.filter(d=>d.hasData);
      if (!daysWithData.length) return '';
      // Daily rows
      const rows = w.days.filter(d=>d.hasData).map(d => {
        const dow = new Date(d.date+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
        return `<div style="display:grid;grid-template-columns:110px 1fr 1fr 1fr;gap:4px;padding:5px 0;border-bottom:1px solid #1e2738;font-size:12px;align-items:center">
          <span style="font-family:'DM Mono',monospace;font-size:10px;color:#8b949e">${dow}</span>
          <span style="color:#c9d1d9">🚶 ${d.steps.toLocaleString()}</span>
          <span style="color:#c9d1d9">🔥 ${d.calories.toLocaleString()}</span>
          <span style="color:#c9d1d9">⚡ ${d.activeMinutes}m</span>
        </div>`;
      }).join('');
      // Week totals
      const totSteps = tot('steps'), totCals = tot('calories'), totActive = tot('activeMinutes');
      const avgSteps = Math.round(totSteps/daysWithData.length);
      return `<div class="activity-summary">
        <div style="display:flex;justify-content:space-between;align-items:center;width:100%;margin-bottom:8px">
          <div class="activity-summary-label" style="margin:0">📅 Week of ${w.label}</div>
          <div style="font-family:'DM Mono',monospace;font-size:10px;color:#8b949e">${daysWithData.length} day${daysWithData.length!==1?'s':''}</div>
        </div>
        ${rows}
        <div style="display:grid;grid-template-columns:110px 1fr 1fr 1fr;gap:4px;padding:6px 0 0;font-size:12px;align-items:center;margin-top:2px">
          <span style="font-family:'DM Mono',monospace;font-size:10px;color:#00b0b9;font-weight:700">TOTAL</span>
          <span class="activity-summary-val">🚶 ${totSteps.toLocaleString()}</span>
          <span class="activity-summary-val">🔥 ${totCals.toLocaleString()}</span>
          <span class="activity-summary-val">⚡ ${totActive}m</span>
        </div>
        <div style="font-family:'DM Mono',monospace;font-size:10px;color:#8b949e;margin-top:4px">Avg steps/day: ${avgSteps.toLocaleString()}</div>
      </div>`;
    }).join('');
  }

  return `
    <div class="transfer-bar">
      <div><div class="transfer-label">Manual backup</div><div class="transfer-desc">Export or import a backup code</div></div>
      <div class="transfer-btns">
        <button class="btn-export" onclick="doExport()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export</button>
        <button class="btn-import" onclick="openImport()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Import</button>
      </div>
    </div>
    ${fbToken ? `
    <div class="transfer-bar" style="margin-bottom:24px">
      <div>
        <div class="transfer-label">Fitbit History</div>
        <div class="transfer-desc">${hasFbHistory ? `${Object.keys(fbHistory).length} days synced since ${fmtShort(startDate||today())}` : 'Sync activity history since your Wegovy start date'}</div>
      </div>
      <button class="btn-sync-history" onclick="fetchFitbitHistory()" ${fbHistorySyncing?'disabled':''}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        ${fbHistorySyncing ? 'Syncing…' : hasFbHistory ? 'Re-sync history' : 'Sync history'}
      </button>
    </div>` : ''}
    <div class="section-title">All Entries</div>
    ${entries.length===0?`<div class="empty-state"><div class="empty-icon">📋</div>No entries yet!</div>`
    :bd.map((e,i)=>{
      const prev=bd[i+1],dk=prev?e.weight-prev.weight:null,dd=dk!==null?toDisplay(Math.abs(dk),u):null;
      // Show weeks between this entry (older) and the next newer entry above it in the list
      const nextEntry = i > 0 ? bd[i-1] : null;
      const actBlocks = nextEntry ? weeklyBlocks(e.date, nextEntry.date) : weeklyBlocks(e.date, today());
      return `<div class="log-entry">
        <div><div class="log-date">${fmtDate(e.date)}</div>
          ${dk!==null?`<div style="margin-top:4px;font-size:11px;font-family:'DM Mono',monospace" class="${dk<0?'trend-down':dk>0?'trend-up':''}">${dk<0?'▼':dk>0?'▲':'–'} ${dd} ${u}</div>`:''}</div>
        <div><div><span class="log-weight">${toDisplay(e.weight,u)}</span><span class="log-unit"> ${u}</span></div>
          <div class="log-meta">
            ${e.dose?`<span class="badge badge-dose">${e.dose}</span>`:''}
            ${(e.activities||[]).map(a=>`<span class="badge badge-activity">${a}</span>`).join('')}
            ${e.feeling?`<span class="badge badge-feel">${e.feeling}</span>`:''}
          </div>${e.notes?`<div class="log-notes">"${e.notes}"</div>`:''}</div>
        <button class="delete-btn" onclick="deleteEntry(${e.id})">✕</button>
      </div>
      ${actBlocks}`;
    }).join('')}`;
}

// ── Actions ───────────────────────────────────────────────────────────────────
function setTab(t)  { activeTab=t; render(); }
function setUnit(u) { unit=u; localStorage.setItem(LS.UNIT,u); form.weight=''; scheduleSave(); render(); }
function editStart(){ tempStart=startDate; editingStart=true; render(); setTimeout(()=>document.getElementById('startInput')?.focus(),50); }
function saveStartDate(){
  const v=document.getElementById('startInput')?.value; if(!v)return;
  startDate=v; localStorage.setItem(LS.START,v); editingStart=false; tempStart=v;
  scheduleSave(); render();
}
// Update chip styles in-place without full re-render (preserves weight input value)
function refreshChips() {
  // Dose
  document.querySelectorAll('[data-type="dose"]').forEach(el => {
    el.className = 'chip' + (DOSES[el.dataset.i] === form.dose ? ' teal-active' : '');
  });
  // Feeling
  document.querySelectorAll('[data-type="feeling"]').forEach(el => {
    el.className = 'chip' + (FEELINGS[el.dataset.i] === form.feeling ? ' active' : '');
  });
  // Activity
  document.querySelectorAll('[data-type="activity"]').forEach(el => {
    el.className = 'chip' + (form.activities.includes(ACTIVITIES[el.dataset.i]) ? ' active' : '');
  });
  // Enable/disable Save button based on current weight input value
  const weightVal = document.querySelector('input[type="number"]')?.value || form.weight;
  form.weight = weightVal;
  const btn = document.querySelector('.btn-primary');
  if (btn) btn.disabled = !form.weight || !form.date;
}

function toggleDose(d)     { form.dose=form.dose===d?'':d; refreshChips(); }
function toggleFeeling(f)  { form.feeling=form.feeling===f?'':f; refreshChips(); }
function toggleActivity(a) {
  form.activities=form.activities.includes(a)?form.activities.filter(x=>x!==a):[...form.activities,a];
  refreshChips();
}

// Event delegation for chip clicks — avoids emoji encoding issues in HTML attributes
document.addEventListener('click', function(e) {
  const chip = e.target.closest('[data-type]');
  if (!chip) return;
  const type = chip.dataset.type;
  const i    = parseInt(chip.dataset.i);
  if (type === 'dose')    { toggleDose(DOSES[i]); }
  if (type === 'feeling') { toggleFeeling(FEELINGS[i]); }
  if (type === 'activity'){ toggleActivity(ACTIVITIES[i]); }
});
function addEntry(){
  if(!form.weight||!form.date)return;
  entries=[{...form,weight:toKg(parseFloat(form.weight),unit),id:Date.now()},...entries];
  scheduleSave();
  form={date:today(),weight:'',dose:'',feeling:'',activities:[],notes:''};
  render();
  const c=document.getElementById('formCard');
  if(c){c.classList.add('flash');setTimeout(()=>c.classList.remove('flash'),600);}
  showToast('✅ Entry saved!');
}
function deleteEntry(id){
  if(!confirm('Delete this entry?'))return;
  entries=entries.filter(e=>e.id!==id); scheduleSave(); render();
}

// ── Boot ──────────────────────────────────────────────────────────────────────
render();
initGoogleAuth();
// Handle Fitbit OAuth callback redirect
fitbitHandleCallback();
// Refresh Fitbit stats if connected and stale
if (fbToken && (!fbStats || fbStats.date !== today())) {
  fetchFitbitStats();
}
</script>
</body>
</html>
